<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
    rel="stylesheet">
    <title>Conversor de moedas</title>
    <link rel="stylesheet" href="../style.css" />

</head>

<body>

    <img class="logo" src="./assets/Logo.gif" alt="log-girf">

    <main>

        <h1><span>CONVERT MONEY</span></h1>

        <label>
            Converter <b>de</b>
            <select>
                <option>R$ Real Brasileiro</option>

            </select>
        </label>

        <label>
            Converter <b>para</b>
            <select class="currency-select">
                <option value="dolar" style="background-color: #0000ff;">US$ Dólar Americano</option>
                <option value="euro" style="background-color: #0000ff;">€ Euro</option>
                <option value="BTC" style="background-color: #0000ff;">BTC Bitcoin</option>
            </select>
        </label>

        <label>
            <b>Valor</b>
            <input class="input-currency" placeholder="R$ 0,00" />
        </label>

        <button class="convert-Button">Converter</button>

        <section>
            <div class="currency-box">
                <img src="./assets/Real.png" alt="moeda-a-converter" />
                <p class="currency">BRL</p>
                <p class="currency-value-to-convert">0,00</p>
            </div>

            <img class="arrow" src="./assets/Seta.png" alt="down arrow">

            <div class="currency-box">
                <img class="currency-img" src="./assets/Dolar.png" alt="moeda-convertida">
                <p class="currency" id="currency-name">USD</p>
                <p class="currency-value-converted">0,00</p>
            </div>

        </section>

    </main>

</body>

<script src="./scripts.js"></script>

</html>
